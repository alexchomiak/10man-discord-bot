name: Docker Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE_NAME }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/10man-discord-bot" >> "$GITHUB_ENV"
          fi

      - name: Prepare build metadata
        run: echo "BUILD_DATE=$(git show -s --format=%cI HEAD)" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=pr
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write image summary
        run: |
          {
            echo "## Docker image published"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            printf 'Digest: `%s`\n' '${{ steps.build.outputs.digest }}'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR image tag
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- docker-pr-image -->';
            const tags = `${{ steps.meta.outputs.tags }}`.split('\n').filter(Boolean);
            const body = [
              marker,
              '## Docker image for this PR',
              '',
              'The workflow built and pushed these Docker tags for server testing:',
              '',
              ...tags.map((tag) => `- \`${tag}\``),
              '',
              `Digest: \`${{ steps.build.outputs.digest }}\``
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
